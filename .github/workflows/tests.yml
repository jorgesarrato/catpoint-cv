name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Cache YOLO weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/ultralytics
          key: yolov8n-weights

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_yolo_integration.py -v

      - name: Run YOLO integration test
        run: pytest tests/test_yolo_integration.py -v
